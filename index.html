<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ Les Aventuriers de Sylve</title>
    <script src="https://unpkg.com/html5-qrcode@1.6.15/minified/html5-qrcode.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Cinzel:wght@400;600;700&display=swap');

        :root {
            --primary: #8b5a2b;
            --secondary: #d4af37;
            --accent: #c9302c;
            --dark: #1a1410;
            --light: #f5e6d3;
            --text: #2c2416;
            --purple: #6a4c93;
            --gold: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #1a1410 0%, #2d2416 50%, #3a2f24 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(106, 76, 147, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            min-height: 100vh;
        }

        /* ====== HEADER ====== */
        header {
            grid-column: 1 / -1;
            text-align: center;
            border-bottom: 3px double var(--secondary);
            padding: 20px 0;
            margin-bottom: 20px;
            background: linear-gradient(to right, rgba(139, 90, 43, 0.5), rgba(212, 175, 55, 0.1), rgba(139, 90, 43, 0.5));
            position: relative;
        }

        header::before {
            content: '⚔️';
            position: absolute;
            left: 20px;
            font-size: 28px;
        }

        header::after {
            content: '🛡️';
            position: absolute;
            right: 20px;
            font-size: 28px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--secondary);
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        /* ====== PANNEAU LATÉRAL GAUCHE - PROFIL ====== */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(245, 230, 211, 0.05) 100%);
            border: 2px solid var(--secondary);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--secondary), transparent);
        }

        .card h2 {
            font-family: 'Cinzel', serif;
            color: var(--secondary);
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--secondary);
            padding-bottom: 10px;
        }

        .profile-item {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 16px;
            color: var(--light);
        }

        .profile-label {
            color: var(--secondary);
            font-weight: bold;
        }

        .profile-value {
            color: #fff;
            font-family: 'Cinzel', serif;
        }

        .btn {
            background: linear-gradient(135deg, var(--secondary) 0%, #b8860b 100%);
            color: var(--dark);
            border: 2px solid var(--secondary);
            padding: 12px 20px;
            border-radius: 5px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent) 0%, #8b0000 100%);
            border-color: var(--accent);
        }

        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(201, 48, 44, 0.4);
        }

        /* ====== SECTION PSEUDO ====== */
        .pseudo-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .pseudo-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--secondary);
            padding: 8px 12px;
            color: var(--light);
            border-radius: 4px;
            font-family: 'Crimson Text', serif;
        }

        .pseudo-input::placeholder {
            color: rgba(245, 230, 211, 0.5);
        }

        /* ====== SECTION CAMÉRA ====== */
        .camera-section {
            display: flex;
            gap: 10px;
        }

        #reader {
            width: 100%;
            background: #000;
            border-radius: 5px;
            min-height: 300px;
            border: 2px solid var(--secondary);
        }

        .scanner-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scanner-overlay.active {
            display: flex;
        }

        .scanner-modal {
            background: var(--dark);
            border: 3px solid var(--secondary);
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
        }

        /* ====== CENTRE - CHAT PUBLIC ====== */
        .center-panel {
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(245, 230, 211, 0.05) 100%);
            border: 2px solid var(--secondary);
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--secondary);
        }

        .message {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: rgba(212, 175, 55, 0.2);
            border-left: 3px solid var(--secondary);
        }

        .message.maitre {
            background: rgba(106, 76, 147, 0.2);
            border-left: 3px solid var(--purple);
        }

        .message.system {
            background: rgba(201, 48, 44, 0.2);
            border-left: 3px solid var(--accent);
            font-style: italic;
            text-align: center;
        }

        .msg-sender {
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: var(--secondary);
            display: block;
            margin-bottom: 3px;
            font-size: 13px;
        }

        .message.maitre .msg-sender {
            color: var(--purple);
        }

        .message.system .msg-sender {
            color: var(--accent);
        }

        .msg-time {
            color: rgba(245, 230, 211, 0.6);
            font-size: 11px;
            margin-top: 4px;
            display: block;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--secondary);
            padding: 12px;
            color: var(--light);
            border-radius: 5px;
            font-family: 'Crimson Text', serif;
            font-size: 14px;
        }

        .chat-input-area button {
            background: linear-gradient(135deg, var(--secondary) 0%, #b8860b 100%);
            border: none;
            color: var(--dark);
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .chat-input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        /* ====== PANNEAU DROIT - AMIS ====== */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .friends-list {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(245, 230, 211, 0.05) 100%);
            border: 2px solid var(--secondary);
            border-radius: 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid var(--secondary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .friend-item:hover {
            background: rgba(212, 175, 55, 0.15);
            transform: translateX(5px);
        }

        .friend-name {
            font-family: 'Cinzel', serif;
            color: var(--secondary);
            font-weight: bold;
        }

        .friend-action {
            background: var(--purple);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .friend-action:hover {
            background: #7b5ba3;
        }

        .add-friend-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .add-friend-area input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--secondary);
            padding: 8px 12px;
            color: var(--light);
            border-radius: 4px;
        }

        .add-friend-area button {
            background: var(--purple);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .add-friend-area button:hover {
            background: #7b5ba3;
        }

        /* ====== NOTIFICATIONS ====== */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--secondary);
            color: var(--dark);
            padding: 15px 25px;
            border-radius: 5px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            animation: slideInRight 0.3s ease-out;
            font-family: 'Cinzel', serif;
            font-weight: bold;
        }

        .notification.error {
            background: var(--accent);
            color: white;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ====== MODAL CHAT PRIVÉ ====== */
        .private-chat-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--dark);
            border: 3px solid var(--purple);
            border-radius: 10px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            z-index: 1500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .private-chat-modal.active {
            display: flex;
        }

        .private-chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--purple);
            padding-bottom: 10px;
        }

        .private-chat-header h3 {
            color: var(--purple);
            font-family: 'Cinzel', serif;
            margin: 0;
            font-size: 18px;
        }

        .close-x {
            background: var(--accent);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
        }

        .close-x:hover {
            background: #8b0000;
            transform: scale(1.1);
        }

        .private-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
        }

        .private-chat-input {
            display: flex;
            gap: 10px;
        }

        .private-chat-input input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--purple);
            padding: 10px;
            color: var(--light);
            border-radius: 4px;
        }

        .private-chat-input button {
            background: var(--purple);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .private-chat-input button:hover {
            background: #7b5ba3;
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1400;
        }

        .modal-backdrop.active {
            display: block;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .left-panel, .right-panel {
                grid-column: 1;
            }
        }

        .close-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #8b0000;
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b8860b;
        }
    </style>
</head>
<body>
    <header>
        <h1>⚔️ LES AVENTURIERS DE SYLVE ⚔️</h1>
    </header>

    <div class="main-container">
        <!-- ====== PANNEAU GAUCHE ====== -->
        <div class="left-panel">
            <!-- Profil -->
            <div class="card">
                <h2>👤 Profil</h2>
                <div class="pseudo-section">
                    <input type="text" class="pseudo-input" id="pseudo-input" placeholder="Ton pseudo...">
                    <button class="btn" id="change-pseudo" style="width: auto;">✓</button>
                </div>
                <div class="profile-item">
                    <span class="profile-label">Pseudo:</span>
                    <span class="profile-value" id="adv-name">Aventurier</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">Rang:</span>
                    <span class="profile-value" id="adv-rank">Rang E</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">Points:</span>
                    <span class="profile-value" id="adv-points">0 / 1000</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">Quêtes:</span>
                    <span class="profile-value" id="quests-completed">0</span>
                </div>
            </div>

            <!-- Quêtes -->
            <div class="card">
                <h2>⚔️ Quêtes</h2>
                <div class="profile-item">
                    <span class="profile-label">En cours:</span>
                    <span class="profile-value" id="quest-current">Aucune</span>
                </div>
                <button class="btn" id="scan-qr">📷 Scanner QR</button>
                <button class="btn btn-danger" id="camera-toggle">📸 Caméra</button>
            </div>

            <!-- Caméra -->
            <div class="card" id="camera-card" style="display: none;">
                <h2>📸 Caméra</h2>
                <video id="camera-video" style="width: 100%; border-radius: 5px; margin: 10px 0;"></video>
                <button class="btn btn-danger" id="close-camera">Fermer</button>
            </div>
        </div>

        <!-- ====== CENTRE - CHAT PUBLIC ====== -->
        <div class="center-panel">
            <div class="chat-container">
                <h2 style="color: var(--secondary); font-family: 'Cinzel', serif; margin-bottom: 15px;">💬 Guilde Chat</h2>
                <div class="chat-messages" id="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Écrire un message...">
                    <button id="chat-send">Envoyer</button>
                </div>
            </div>
        </div>

        <!-- ====== PANNEAU DROIT - AMIS ====== -->
        <div class="right-panel">
            <!-- Ajouter ami -->
            <div class="card">
                <h2>👥 Amis</h2>
                <div class="add-friend-area">
                    <input type="text" id="friend-input" placeholder="Pseudo du joueur...">
                    <button id="add-friend">Ajouter</button>
                </div>
                <div class="friends-list" id="friends-list">
                    <p style="color: var(--secondary); text-align: center;">Aucun ami pour le moment</p>
                </div>
            </div>

            <!-- Notifications -->
            <div class="card">
                <h2>🔔 Notifications</h2>
                <div id="notifications-list" style="max-height: 300px; overflow-y: auto;">
                    <p style="color: var(--secondary); text-align: center;">Aucune notification</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Scanner QR -->
    <div class="scanner-overlay" id="scanner-overlay">
        <div class="scanner-modal">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="color: var(--secondary); margin: 0;">📷 Scanner QR Code</h2>
                <button class="close-x" id="close-scanner">✕</button>
            </div>
            <div id="reader" style="width: 100%;"></div>
        </div>
    </div>

    <!-- Modal Chat Privé -->
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="private-chat-modal" id="private-chat-modal">
        <div class="private-chat-header">
            <h3 id="private-chat-title">Chat Privé</h3>
            <button class="close-x" id="close-private-chat">✕</button>
        </div>
        <div class="private-messages" id="private-messages"></div>
        <div class="private-chat-input">
            <input type="text" id="private-input" placeholder="Message...">
            <button id="send-private">Envoyer</button>
        </div>
    </div>

    <script>
        // ============= CONFIG =============
        const BACKEND_URL = 'http://localhost:5000';
        let socket = null;
        try {
            socket = io(BACKEND_URL);
        } catch (err) {
            console.warn('Socket.io non disponible - mode local');
        }
        
        const RANGS = ["Rang E", "Rang D", "Rang C", "Rang B", "Rang A", "Rang S", "Rang SS", "Rang SSS", "Rang SSS+"];

        // ============= STATE =============
        let currentUser = null;
        let friends = [];
        let privateChatWith = null;
        let html5QrcodeScanner = null;
        let cameraStream = null;

        // ============= INIT =============
        async function init() {
            const savedUser = localStorage.getItem('g_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('pseudo-input').value = currentUser.displayName || currentUser.username;
                updateUI();
                if (socket) socket.emit('join', currentUser.username);
            } else {
                const username = 'User_' + Math.random().toString(36).substring(7);
                currentUser = { username, displayName: username, points: 0, questsCompleted: 0 };
                localStorage.setItem('g_user', JSON.stringify(currentUser));
                document.getElementById('pseudo-input').value = currentUser.displayName;
                updateUI();
                if (socket) socket.emit('join', currentUser.username);
            }
        }

        // ============= NOTIFICATIONS =============
        function showNotif(msg, type = 'success') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // ============= PSEUDO =============
        document.getElementById('change-pseudo').addEventListener('click', async () => {
            const newName = document.getElementById('pseudo-input').value.trim();
            if (!newName) return;
            currentUser.displayName = newName;
            localStorage.setItem('g_user', JSON.stringify(currentUser));
            updateUI();
            showNotif('✅ Pseudo changé!');
        });

        // ============= UI UPDATE =============
        function updateUI() {
            document.getElementById('adv-name').textContent = currentUser.displayName || currentUser.username;
            const index = Math.floor((currentUser.points || 0) / 1000);
            document.getElementById('adv-rank').textContent = RANGS[Math.min(index, RANGS.length - 1)];
            document.getElementById('adv-points').textContent = `${(currentUser.points || 0) % 1000} / 1000`;
            document.getElementById('quests-completed').textContent = currentUser.questsCompleted || 0;
        }

        // ============= CHAT PUBLIC =============
        document.getElementById('chat-send').addEventListener('click', () => {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                const msgData = {
                    sender: currentUser.displayName || currentUser.username,
                    text: input.value,
                    type: 'user',
                    timestamp: new Date()
                };
                if (socket) {
                    socket.emit('send-message', msgData);
                } else {
                    addMessageToChat(msgData);
                }
                input.value = '';
            }
        });

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('chat-send').click();
        });

        function addMessageToChat(msg) {
            const chatBox = document.getElementById('chat-box');
            const msgEl = document.createElement('div');
            msgEl.className = `message ${msg.type || 'user'}`;
            const time = new Date(msg.timestamp).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
            msgEl.innerHTML = `
                <span class="msg-sender">${msg.sender}</span>
                <div>${msg.text}</div>
                <span class="msg-time">[${time}]</span>
            `;
            chatBox.appendChild(msgEl);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        if (socket) {
            socket.on('receive-message', addMessageToChat);
        }

        // ============= AMIS =============
        document.getElementById('add-friend').addEventListener('click', () => {
            const friendName = document.getElementById('friend-input').value.trim();
            if (!friendName) return;
            if (!friends.includes(friendName)) {
                friends.push(friendName);
                localStorage.setItem('g_friends', JSON.stringify(friends));
                document.getElementById('friend-input').value = '';
                updateFriendsList();
                showNotif('✅ Ami ajouté!');
            } else {
                showNotif('⚠️ Ami déjà ajouté', 'error');
            }
        });

        function updateFriendsList() {
            const list = document.getElementById('friends-list');
            if (friends.length === 0) {
                list.innerHTML = '<p style="color: var(--secondary); text-align: center;">Aucun ami pour le moment</p>';
                return;
            }
            list.innerHTML = friends.map(f => `
                <div class="friend-item">
                    <span class="friend-name">👤 ${f}</span>
                    <button class="friend-action" onclick="openPrivateChat('${f}')">💬</button>
                </div>
            `).join('');
        }

        function loadFriends() {
            const saved = localStorage.getItem('g_friends');
            if (saved) {
                friends = JSON.parse(saved);
                updateFriendsList();
            }
        }

        // ============= CHAT PRIVÉ =============
        function openPrivateChat(friendName) {
            privateChatWith = friendName;
            document.getElementById('private-chat-title').textContent = `Chat avec ${friendName}`;
            document.getElementById('private-chat-modal').classList.add('active');
            document.getElementById('modal-backdrop').classList.add('active');
            document.getElementById('private-messages').innerHTML = `<p style="color: var(--secondary); text-align: center;">Aucun message</p>`;
        }

        document.getElementById('send-private').addEventListener('click', () => {
            const input = document.getElementById('private-input');
            if (input.value.trim() && privateChatWith) {
                const msgData = {
                    from: currentUser.username,
                    to: privateChatWith,
                    text: input.value,
                    timestamp: new Date()
                };
                if (socket) {
                    socket.emit('send-private-message', msgData);
                }
                addPrivateMessage({
                    ...msgData,
                    from: currentUser.displayName
                });
                input.value = '';
            }
        });

        function addPrivateMessage(msg) {
            const container = document.getElementById('private-messages');
            if (container.textContent.includes('Aucun message')) {
                container.innerHTML = '';
            }
            const msgEl = document.createElement('div');
            msgEl.className = `message ${msg.from === currentUser.username ? 'user' : 'maitre'}`;
            msgEl.innerHTML = `
                <span class="msg-sender">${msg.from}</span>
                <div>${msg.text}</div>
            `;
            container.appendChild(msgEl);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('close-private-chat').addEventListener('click', () => {
            document.getElementById('private-chat-modal').classList.remove('active');
            document.getElementById('modal-backdrop').classList.remove('active');
            privateChatWith = null;
        });

        // ============= SCANNER QR =============
        document.getElementById('scan-qr').addEventListener('click', () => {
            document.getElementById('scanner-overlay').classList.add('active');
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner('reader', {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                }, false);
                html5QrcodeScanner.render(onQRSuccess, onQRError);
            }
        });

        function onQRSuccess(decodedText) {
            showNotif(`✅ QR scanné: ${decodedText}`);
            closeScanner();
        }

        function onQRError(error) {
            console.debug('QR Scan error:', error);
        }

        function closeScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().catch(() => {
                    html5QrcodeScanner = null;
                });
                html5QrcodeScanner = null;
            }
            document.getElementById('scanner-overlay').classList.remove('active');
        }

        document.getElementById('close-scanner').addEventListener('click', closeScanner);

        // ============= CAMÉRA =============
        document.getElementById('camera-toggle').addEventListener('click', async () => {
            const card = document.getElementById('camera-card');
            const video = document.getElementById('camera-video');
            if (card.style.display === 'none') {
                card.style.display = 'block';
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = cameraStream;
                    showNotif('✅ Caméra activée!');
                } catch (err) {
                    showNotif('❌ Erreur caméra: ' + err.message, 'error');
                    card.style.display = 'none';
                }
            }
        });

        document.getElementById('close-camera').addEventListener('click', () => {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('camera-card').style.display = 'none';
            showNotif('✅ Caméra fermée');
        });

        // ============= INIT =============
        init();
        loadFriends();
    </script>
</body>
</html>
